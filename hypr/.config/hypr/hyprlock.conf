# =============================================================
# Hyprlock — colors injected by scripts/switch-theme.sh
# =============================================================
# THEME:START
$hl_bg          = rgba(2f383ecc)
$hl_text        = rgba(d3c6aaff)
$hl_text_dim    = rgba(d3c6aabb)
$hl_text_dimmer = rgba(d3c6aa77)
$hl_accent      = rgba(859289ff)
$hl_border      = rgba(83c092ff)
$hl_fail        = rgba(e67e80ff)
$hl_input_bg    = rgba(37424788)
# THEME:END

background {
    monitor =
    path = screenshot
    color = $hl_bg
    blur_passes = 3
    blur_size = 8
}

# Terminal-style header
label {
    monitor =
    text = ── System Status ──
    color = $hl_text_dimmer
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, 1100
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 400, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = $hl_border
    inner_color = $hl_input_bg
    font_color = $hl_text
    check_color = $hl_accent
    fail_color = $hl_fail
    fade_on_empty = true
    hide_input = false
    position = 0, -900
    halign = center
    valign = center
    placeholder_text = <i>sudo rm -rf / --no-preserve-root</i>
    rounding = -1
}

# Terminal-style prompt
label {
    monitor =
    text = >
    color = $hl_text_dim
    font_size = 30
    font_family = Hack Nerd Font
    position = -220, -900
    halign = center
    valign = center
}

# Date Label with Unix timestamp
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d") | $(date +%s)"
    color = $hl_text_dim
    font_size = 25
    font_family = Hack Nerd Font
    position = 0, 1000
    halign = center
    valign = center
}

# Time Label in 24h format
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = $hl_border
    font_size = 120
    font_family = Hack Nerd Font
    position = 0, 900
    halign = center
    valign = center
}

# Username Label with hostname
label {
    monitor =
    text = cmd[update:1000] echo "$USER@$HOSTNAME"
    color = $hl_text_dim
    font_size = 30
    font_family = Hack Nerd Font
    position = 0, -850
    halign = center
    valign = center
}

# System Info
label {
    monitor =
    text = cmd[update:1000] echo "Kernel: $(uname -r)"
    color = $hl_text_dimmer
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, 750
    halign = center
    valign = center
}

# System uptime
label {
    monitor =
    text = cmd[update:1000] echo "uptime: $(uptime -p | sed 's/up //')"
    color = $hl_text_dimmer
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, 700
    halign = center
    valign = center
}

# Shell Info
label {
    monitor =
    text = cmd[update:1000] echo "Shell: $SHELL"
    color = $hl_text_dimmer
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, 650
    halign = center
    valign = center
}

# Terminal-style footer
label {
    monitor =
    text = ── Session Locked ──
    color = $hl_text_dimmer
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, -950
    halign = center
    valign = center
}

# Keyboard layout indicator
label {
    monitor =
    text = cmd[update:1000] hyprctl devices -j | jq -r '.keyboards[] | select(.main) | .active_keymap'
    color = $hl_text_dimmer
    font_size = 16
    font_family = Hack Nerd Font
    position = -50, 50
    halign = right
    valign = bottom
}

# Weather widget (optional - comment out if slow)
label {
    monitor =
    text = cmd[update:3600000] curl -s 'wttr.in/?format=%c+%t'
    color = $hl_text_dimmer
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, 600
    halign = center
    valign = center
}
