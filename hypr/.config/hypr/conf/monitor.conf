# See https://wiki.hyprland.org/Configuring/Monitors/
# Fallback: works on any machine with any monitor name/resolution
monitor=,preferred,auto,1

# To override for your specific hardware, add lines below here.
# They take priority over the fallback above. Examples:
#   monitor=eDP-1,highres,auto,1.5
#   monitor=HDMI-A-1,2560x1440@144,auto,1
monitor=eDP-1,highres,auto,1.5
