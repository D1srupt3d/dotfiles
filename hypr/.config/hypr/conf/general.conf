# Hyprland General Configuration - Graphite Theme
# See https://wiki.hyprland.org/Configuring/Variables/ for more
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 3
    col.active_border = rgba(808080ee) rgba(aaaaaaff) rgba(ccccccff) 45deg
    col.inactive_border = rgba(1a1a1a77)
    layout = dwindle
    resize_on_border = true
}
