# See https://wiki.hyprland.org/Configuring/Variables/ for more
decoration {
    rounding = 14
    
    # Enhanced blur
    blur {
        enabled = true
        size = 8
        passes = 3
    }
    
    # Dim inactive windows
    dim_inactive = true
    dim_strength = 0.05
    
    # Enhanced shadows
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}
